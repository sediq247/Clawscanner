<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClawScanner | Crypto News</title>
<link rel="stylesheet" href="/css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- HEADER -->
<header class="navbar">
    <div class="logo">
        <img src="/assets/logo.png.png" alt="ClawScanner Logo" class="logo-img">
        <span class="logo-text">ClawScanner</span>
    </div>
</header>

<!-- LATEST CRYPTO NEWS -->
<section class="crypto-news">
    <div class="container">
        <h2 class="section-title">📰 Latest Crypto News</h2>
        <div id="newsFeed" class="news-feed">
            <!-- News articles populated by news.js -->
        </div>
    </div>
</section>

<!-- TRENDING COINS -->
<section class="markets">
    <div class="container">
        <h2 class="section-title">🔥 Trending Coins</h2>
        <div id="trendingCoins" class="coin-grid">
            <!-- Trending coins populated by app.js -->
        </div>
    </div>
</section>

<!-- TOP TRADED COINS -->
<section class="markets">
    <div class="container">
        <h2 class="section-title">💰 Top Traded Coins</h2>
        <div id="topCoins" class="coin-grid">
            <!-- Top traded coins populated by app.js -->
        </div>
    </div>
</section>

<!-- BOTTOM NAVIGATION -->
<nav class="bottom-nav">
    <a href="index.html">Home</a>
    <a href="scan.html">Scan Token</a>
    <a href="news.html" class="active">Crypto News</a>
</nav>

<!-- EXTERNAL JS FILES -->
<script type="module" src="/js/news.js"></script>

</body>
</html>
