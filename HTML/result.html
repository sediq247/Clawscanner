<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClawScanner | Scan Result</title>
<link rel="stylesheet" href="/css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- HEADER -->
<header class="navbar">
    <div class="logo">
        <img src="/assets/logo.png.png" alt="ClawScanner Logo" class="logo-img">
        <span class="logo-text">ClawScanner</span>
    </div>
</header>

<!-- SCAN RESULT SECTION -->
<section class="scan-result">
    <div class="container">
        <h2 class="section-title">Token Details</h2>

        <!-- Token Summary -->
        <div class="token-summary">
            <img id="tokenLogo" src="/images/default-token.png" alt="Token Logo" class="token-logo">
            <div class="token-info">
                <h3 id="tokenName">Token Name</h3>
                <p id="tokenSymbol">Symbol</p>
                <p id="tokenChain">Chain</p>
                <p id="tokenDEX">DEX</p>
            </div>
        </div>

        <!-- Market Metrics -->
        <div class="market-metrics">
            <h3>Market Data</h3>
            <ul>
                <li>Price: $<span id="tokenPrice">--</span></li>
                <li>Liquidity: $<span id="tokenLiquidity">--</span></li>
                <li>Market Cap: $<span id="tokenMarketCap">--</span></li>
                <li>24h Volume: $<span id="tokenVolume">--</span></li>
            </ul>
        </div>

        <!-- Vulnerabilities / Checks -->
        <div class="vulnerabilities">
            <h3>Vulnerabilities & Checks</h3>
            <ul id="tokenChecks">
                <!-- Populated by result.js -->
            </ul>

            <!-- Risk Score & Rating UNDER vulnerabilities -->
            <div class="risk-analysis">
                <h3>Risk Score: <span id="riskScore">--</span>/100</h3>
                <p>Rating: <span id="riskRating">--</span></p>
                <p>Advice: <span id="riskAdvice">--</span></p>
            </div>
        </div>

        <!-- Back / Scan Another -->
        <div class="actions">
            <button class="btn" onclick="window.location.href='scan.html'">Scan Another Token</button>
            <button class="btn" onclick="window.location.href='index.html'">Back Home</button>
        </div>

    </div>
</section>

<!-- RECENT SCANS -->
<section class="recent-scans">
    <h2 class="section-title">Recent Scans</h2>
    <div id="scanHistory" class="history-list">
        <!-- Populated by result.js -->
    </div>
</section>

<!-- BOTTOM NAVIGATION -->
<nav class="bottom-nav">
    <a href="index.html">Home</a>
    <a href="scan.html">Scan Token</a>
    <a href="news.html">Crypto News</a>
</nav>

<!-- EXTERNAL JS FILES -->
<script type="module" src="/js/result.js"></script>
<script type="module" src="/js/scanner.js"></script>


</body>
</html>
