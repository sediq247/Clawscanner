<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClawScanner | Scan Token</title>
<link rel="stylesheet" href="../css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- HEADER -->
<header class="navbar">
    <div class="logo">
        <img src="/images/logo.png" alt="ClawScanner Logo" class="logo-img">
        <span class="logo-text">ClawScanner</span>
    </div>
</header>

<!-- SCAN TOKEN SECTION -->
<section class="scan-section">
    <div class="container">
        <h2 class="section-title">🔍 Scan a Token</h2>
        <p>Enter the token contract address to detect scams, rug pulls, honeypots, and other vulnerabilities.</p>

        <div class="scan-box">
            <input type="text" id="tokenAddress" placeholder="Enter Token Contract Address">
            <button id="scanBtn" class="btn">Scan Token</button>
        </div>
    </div>
</section>

<!-- RECENT SCANS -->
<section class="recent-scans">
    <h2 class="section-title">🕒 Recent Scans</h2>
    <div id="scanHistory" class="history-list">
        <!-- Recent scans populated by external JS -->
    </div>
</section>

<!-- BOTTOM NAVIGATION -->
<nav class="bottom-nav">
    <a href="index.html">Home</a>
    <a href="scan.html" class="active">Scan Token</a>
    <a href="news.html">Crypto News</a>
</nav>

<!-- EXTERNAL JS FILES -->
<script type="module" src="/js/scanner.js"></script>


</body>
</html>
