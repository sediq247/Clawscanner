<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClawScanner | Crypto Security & Market Scanner</title>
<link rel="stylesheet" href="/css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- HEADER -->
<header class="navbar">
    <div class="logo">
        <img src="/assets/logo.png.png" alt="ClawScanner Logo" class="logo-img">
        <span class="logo-text">ClawScanner</span>
    </div>
</header>

<!-- QUICK SCAN SECTION -->
<section class="quick-scan">
    <div class="container">
        <button class="btn" onclick="window.location.href='scan.html'">Quick Scan</button>
        <p>Scan any token instantly before you trade. Protect your funds from scams and rug pulls.</p>
    </div>
</section>

<!-- MARKETS SECTION WITH TABS -->
<section class="markets">
    <h2 class="section-title">🔥 Crypto Markets</h2>
    
    <!-- Tabs -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="trendingCoins">Trending</button>
        <button class="tab-btn" data-tab="topGainers">Top Gainers</button>
        <button class="tab-btn" data-tab="topLosers">Top Losers</button>
        <button class="tab-btn" data-tab="topCoins">Top Traded</button>
    </div>

    <!-- Tab content -->
    <div class="tab-content">
        <div id="trendingCoins" class="coin-grid active"></div>
        <div id="topGainers" class="coin-grid"></div>
        <div id="topLosers" class="coin-grid"></div>
        <div id="topCoins" class="coin-grid"></div>
    </div>
</section>

<!-- BOTTOM NAVIGATION -->
<nav class="bottom-nav">
    <a href="index.html" class="active">Home</a>
    <a href="scan.html">Scan Token</a>
    <a href="news.html">Crypto News</a>
</nav>

<!-- EXTERNAL JS FILES -->
<script type="module" src="/js/app.js"></script>

</body>
</html>
